; ===========================================================================
; IPmanager sozlamalari
; Bu faylni o'rnatuvchi (installer) avtomatik to'ldiradi.
; Qo'lda ham o'zgartirsa bo'ladi — o'zgarishdan keyin dasturni qayta oching.
; ===========================================================================

[paths]
; Ma'lumot bazasi (ipmanager.db) va sessiya kaliti shu papkaga yoziladi
data_dir = C:\IPmanager\data
; Log fayllari shu papkaga yig'iladi
log_dir = C:\IPmanager\logs
; Kunlik zaxira (backup) nusxalari shu papkaga yig'iladi
backup_dir = C:\IPmanager\backups

[server]
; 127.0.0.1 = faqat shu kompyuterning o'zidan kirish mumkin (eng xavfsiz).
; Agar tarmoqdagi boshqa kompyuterlar ham kirsin desangiz: 0.0.0.0
host = 127.0.0.1
port = 5000
; Dastur qanday ochilsin:
;   auto    = avval mustaqil oyna (pywebview), bo'lmasa standart brauzer
;   browser = to'g'ridan-to'g'ri kompyuterdagi standart brauzer (Chrome/Edge/Yandex...)
;   window  = faqat mustaqil oyna
ui_mode = auto

[backup]
; Zaxira nusxalar necha kun saqlansin (undan eskilari avtomatik o'chiriladi)
keep_days = 30
